services:
  redis:
    image: redis:7-alpine
    restart: on-failure:5
    ports:
    - 6379:6379
    networks:
    - eloquence-network
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
    - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    tmpfs:
    - /tmp:noexec,nosuid,size=100m
  vosk-stt-analysis:
    build:
      context: ./services/vosk-stt-analysis
      dockerfile: Dockerfile
    image: eloquence/vosk-stt-analysis:latest
    restart: unless-stopped
    ports:
      - "8001:8001"  # Remplace whisper-stt
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - VOSK_MODEL_PATH=/app/models
      - MAX_WORKERS=8  # Scaleway power
      - UVLOOP_ENABLED=true
    networks:
      - eloquence-network
    volumes:
      - vosk-models:/app/models
      - vosk-cache:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s  # Temps chargement modèles volumineux
    deploy:
      resources:
        limits:
          memory: 8G      # Modèles volumineux (1.5GB+)
          cpus: '4.0'     # Performance maximale Scaleway
        reservations:
          memory: 4G
          cpus: '2.0'
    depends_on:
      redis:
        condition: service_healthy
        
  api-backend:
    build:
      context: ./services/api-backend
      dockerfile: Dockerfile
    image: eloquence/api-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VOSK_ANALYSIS_URL=http://vosk-stt-analysis:8001
      - MISTRAL_API_URL=${MISTRAL_API_URL}
      - REDIS_URL=redis://redis:6379
    networks:
      - eloquence-network
    depends_on:
      vosk-stt-analysis:  # ✅ Nouvelle dépendance
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '3.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    tmpfs:
    - /tmp:noexec,nosuid,size=200m
    volumes:
    - ./vad_diagnostic.py:/app/vad_diagnostic.py:ro
    - api-cache:/app/.cache
    labels:
      audio.fixed: 'true'
      modified.date: '2025-06-23T22:12:01.900806'
  livekit:
    image: livekit/livekit-server:latest
    command: --config /livekit.yaml
    restart: unless-stopped
    ports:
    - "7880:7880"
    - "7881:7881"
    # - "50000-60000:50000-60000/udp" # Commenté pour compatibilité Windows
    volumes:
    - ./services/livekit/livekit.yaml:/livekit.yaml:ro
    - livekit-data:/data
    networks:
    - eloquence-network
    healthcheck:
      # Utilise netcat (nc) pour vérifier si le port TCP est ouvert. C'est plus fiable que de dépendre d'un endpoint /health.
      test: ["CMD", "nc", "-z", "localhost", "7880"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    tmpfs:
    - /tmp:noexec,nosuid,size=100m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
  openai-tts:
    build:
      context: ./services/api-backend/openai-tts
      dockerfile: Dockerfile
    image: eloquence/openai-tts:latest
    restart: unless-stopped # Politique de redémarrage robuste
    ports:
    - 5002:5002
    env_file:
    - .env
    environment:
    - OPENAI_API_KEY=${OPENAI_API_KEY}
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - PYTHONHASHSEED=random
    networks:
    - eloquence-network
    volumes:
    - tts-cache:/app/.cache
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5002/health
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    tmpfs:
    - /tmp:noexec,nosuid,size=100m
  eloquence-agent-v1:
    build:
      context: ./services/api-backend
      dockerfile: Dockerfile.agent
    image: eloquence/agent-v1:latest
    command: python -u services/real_time_voice_agent_force_audio_fixed.py dev
    restart: unless-stopped # Changé de 'no' à unless-stopped
    ports:
    - 8080:8080
    env_file:
    - .env
    environment:
    - LIVEKIT_URL=ws://livekit:7880
    - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
    - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    - OPENAI_TTS_URL=${OPENAI_TTS_URL}
    - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    - MISTRAL_BASE_URL=${MISTRAL_BASE_URL}
    - MISTRAL_MODEL=${MISTRAL_MODEL}
    - OPENAI_API_KEY=${OPENAI_API_KEY}
    - LIVEKIT_LOG_LEVEL=info
    - LIVEKIT_AGENT_NAME=eloquence-coach-v1
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
    - PYTHONHASHSEED=random
    - OMP_NUM_THREADS=2
    networks:
    - eloquence-network
    volumes:
    - agent-cache:/app/.cache
    - agent-models:/app/data/models
    depends_on:
      livekit:
        condition: service_healthy # Changé de service_started
      redis:
        condition: service_healthy # Changé de service_started
      openai-tts:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    tmpfs:
    - /tmp:noexec,nosuid,size=500m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
networks:
  eloquence-network:
    driver: bridge
volumes:
  livekit-data:
    driver: local
  redis-data:
    driver: local
  vosk-models:
    driver: local
  vosk-cache:
    driver: local
  whisper-models-data:
    driver: local
  api-cache:
    driver: local
  tts-cache:
    driver: local
  agent-cache:
    driver: local
  agent-models:
    driver: local
  whisper-tmp:
    driver: local
  whisper-realtime-cache:
    driver: local
  whisper-realtime-logs:
    driver: local
  whisper-realtime-temp:
    driver: local
