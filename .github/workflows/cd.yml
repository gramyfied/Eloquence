# Workflow de déploiement continu (CD)
name: CD

on:
  push:
    branches:
      - main
      - deployment-scaleway-production
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - 'Dockerfile.*'

jobs:
  # Job de validation simple avant déploiement
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Validate deployment readiness
      run: |
        echo "Validation des fichiers de déploiement..."
        test -f docker-compose.yml || exit 1
        echo "✅ Prêt pour le déploiement"

  deploy:
    runs-on: ubuntu-latest
    needs: validate # Dépend du job de validation dans le même workflow
    environment:
      name: production # Environnement de déploiement
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy to Server
      run: echo "Déploiement sur le serveur de production..."
